# URL real de Railway
spring.datasource.url=jdbc:mysql://maglev.proxy.rlwy.net:10845/railway?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&allowLoadLocalInfile=true


spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CONFIGURACI”N DE CORREO (AÒadir al application.properties)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true