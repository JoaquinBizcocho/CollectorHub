# URL con parametros de seguridad para evitar el error de plugins
spring.datasource.url=jdbc:mysql://localhost:3307/collectorhub?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&allowLoadLocalInfile=true

spring.datasource.username=root
spring.datasource.password=admin_password

# Forzamos el driver y el dialecto para que no haya dudas
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Utilidades de log
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true